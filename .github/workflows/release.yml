name: Release

on:
  push:
    tags:
      - "v*.*.*"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_BACKEND: ghcr.io/${{ github.repository }}/backend
  IMAGE_FRONTEND: ghcr.io/${{ github.repository }}/frontend

jobs:
  metadata:
    name: Release Metadata
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
      changelog: ${{ steps.changelog.outputs.changelog }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version
        id: meta
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "Release version: ${VERSION}"

      - name: Generate changelog
        id: changelog
        run: |
          PREV_TAG=$(git tag --sort=-version:refname | sed -n '2p')
          CURR_TAG=${GITHUB_REF#refs/tags/}

          if [ -z "$PREV_TAG" ]; then
            COMMITS=$(git log --oneline --no-merges "${CURR_TAG}" | head -50)
          else
            COMMITS=$(git log --oneline --no-merges "${PREV_TAG}..${CURR_TAG}" | head -50)
          fi

          CHANGELOG="## Что изменилось\n\n"
          CHANGELOG+="**Коммиты:**\n\`\`\`\n${COMMITS}\n\`\`\`"

          echo "changelog<<EOF" >> $GITHUB_OUTPUT
          echo -e "$CHANGELOG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

  test:
    name: Pre-Release Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install and test
        working-directory: backend
        env:
          APP_ENV: test
          DATABASE_URL: sqlite:///./test.db
          LLM_PROVIDER: mock
          LLM_API_KEY: test-key
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio pytest-cov httpx
          pytest tests/ -v --tb=short -x

  build-and-push:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    needs: [metadata, test]
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - service: backend
            context: ./backend
            dockerfile: ./backend/Dockerfile
            image: ghcr.io/${{ github.repository }}/backend
          - service: frontend
            context: ./frontend
            dockerfile: ./frontend/Dockerfile
            image: ghcr.io/${{ github.repository }}/frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU (multi-platform)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ matrix.image }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-,format=short

      - name: Build and push ${{ matrix.service }}
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}
          platforms: linux/amd64,linux/arm64

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [metadata, build-and-push]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Create release
        uses: softprops/action-gh-release@v1
        with:
          name: "v${{ needs.metadata.outputs.version }}"
          body: |
            ## Парсер контактной информации v${{ needs.metadata.outputs.version }}

            ${{ needs.metadata.outputs.changelog }}

            ## Docker образы

            ```bash
            # Backend
            docker pull ${{ env.IMAGE_BACKEND }}:${{ needs.metadata.outputs.version }}

            # Frontend
            docker pull ${{ env.IMAGE_FRONTEND }}:${{ needs.metadata.outputs.version }}
            ```

            ## Быстрый запуск

            ```bash
            # Скачать docker-compose.yml и .env.example
            curl -O https://raw.githubusercontent.com/${{ github.repository }}/main/docker-compose.yml
            curl -O https://raw.githubusercontent.com/${{ github.repository }}/main/.env.example
            cp .env.example .env
            # Заполнить .env, затем:
            docker compose up -d
            ```
          draft: false
          prerelease: ${{ contains(github.ref, '-rc') || contains(github.ref, '-beta') || contains(github.ref, '-alpha') }}
          generate_release_notes: true
          token: ${{ secrets.GITHUB_TOKEN }}
