name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: []
    environment: production
    steps:
      - name: Trigger deployment webhook
        run: |
          curl -f -X POST \
            -H "Content-Type: application/json" \
            -H "X-Hub-Signature-256: sha256=$(echo -n '{"ref":"refs/heads/main"}' | openssl dgst -sha256 -hmac '${{ secrets.WEBHOOK_SECRET }}' | cut -d' ' -f2)" \
            -d '{"ref":"refs/heads/main"}' \
            ${{ secrets.DEPLOY_WEBHOOK_URL }} || echo "Webhook sent (fire-and-forget)"

      - name: Wait for deployment
        run: sleep 30

      - name: Health check
        run: |
          for i in {1..10}; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" ${{ secrets.APP_URL }}/health 2>/dev/null || echo 000)
            if [ "$STATUS" = "200" ]; then
              echo "✅ Application is healthy!"
              exit 0
            fi
            echo "Attempt $i: HTTP $STATUS, waiting..."
            sleep 10
          done
          echo "❌ Health check failed after 10 attempts"
          exit 1
