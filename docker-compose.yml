version: '3.9'

services:
  # ── Backend ──────────────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: contact-parser-backend:latest
    container_name: contact-parser-backend
    restart: unless-stopped
    environment:
      # LLM configuration
      LLM_PROVIDER: ${LLM_PROVIDER:-perplexity}
      LLM_API_KEY: ${LLM_API_KEY:-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}
      LLM_MODEL: ${LLM_MODEL:-sonar}
      LLM_BASE_URL: ${LLM_BASE_URL:-https://api.perplexity.ai}
      LLM_TIMEOUT: ${LLM_TIMEOUT:-60}
      LLM_MAX_TOKENS_PER_REQUEST: ${LLM_MAX_TOKENS_PER_REQUEST:-4096}
      LLM_SESSION_TOKEN_BUDGET: ${LLM_SESSION_TOKEN_BUDGET:-1000000}
      # App configuration
      APP_ENV: ${APP_ENV:-production}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      MAX_CONCURRENT_CRAWLERS: ${MAX_CONCURRENT_CRAWLERS:-5}
      CRAWL_TIMEOUT_SECONDS: ${CRAWL_TIMEOUT_SECONDS:-30}
      MAX_PAGES_PER_SITE: ${MAX_PAGES_PER_SITE:-10}
      RESULTS_DIR: /app/results
      LOGS_DIR: /app/logs
      # Database
      DATABASE_URL: ${DATABASE_URL:-sqlite:////app/data/contact_parser.db}
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - backend-results:/app/results
      - backend-logs:/app/logs
      - backend-data:/app/data
    networks:
      - contact-parser-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ── Frontend ─────────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ""
    image: contact-parser-frontend:latest
    container_name: contact-parser-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-3000}:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - contact-parser-net
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:80"]
      interval: 30s
      timeout: 10s
      retries: 3

# ── Networks ──────────────────────────────────────────────────────────────────
networks:
  contact-parser-net:
    driver: bridge
    name: contact-parser-net

# ── Volumes ───────────────────────────────────────────────────────────────────
volumes:
  backend-results:
    name: contact-parser-results
  backend-logs:
    name: contact-parser-logs
  backend-data:
    name: contact-parser-data
